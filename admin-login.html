<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 进取时代制作组</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', 'SimSun', 'STSong', serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            position: relative;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #6366f1;
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .form-group input:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        .lock-message {
            background: #fef3c7;
            color: #d97706;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        .success-message {
            background: #dcfce7;
            color: #16a34a;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        .captcha-container {
            margin-bottom: 20px;
        }
        .captcha-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .captcha-input {
            flex: 1;
        }
        .captcha-image {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: transform 0.3s;
            min-width: 100px;
            text-align: center;
        }
        .captcha-image:hover {
            transform: scale(1.05);
        }
        .captcha-hint {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 8px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #64748b;
            text-decoration: none;
        }
        .back-link a:hover {
            color: #6366f1;
        }
        .security-info {
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: center;
            margin-top: 15px;
        }
        .login-timer {
            text-align: center;
            margin-top: 10px;
            color: #d97706;
            font-weight: 600;
        }
        .attempt-counter {
            font-size: 0.85rem;
            color: #94a3b8;
            text-align: center;
            margin-top: 10px;
        }
        .warning-text {
            color: #dc2626;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>管理员登录</h1>
        </div>
        
        <div id="lockMessage" class="lock-message">
            账户已锁定，请稍后再试
        </div>
        
        <div id="successMessage" class="success-message">
            登录成功，正在跳转...
        </div>
        
        <div id="errorMessage" class="error-message">
            登录信息有误，请重试
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            
            <div class="captcha-container">
                <div class="captcha-box">
                    <input type="text" id="captchaInput" class="captcha-input form-group" placeholder="请输入验证码" required>
                    <div id="captchaDisplay" class="captcha-image" onclick="generateCaptcha()"></div>
                </div>
                <div class="captcha-hint">点击验证码刷新</div>
            </div>
            
            <button type="submit" class="btn" id="loginBtn">登录</button>
            
            <div id="loginTimer" class="login-timer" style="display: none;"></div>
            <div id="attemptCounter" class="attempt-counter"></div>
        </form>
        
        <div class="back-link">
            <a href="index.html">返回首页</a>
        </div>
        
        <div class="security-info">
            非管理员请选择返回首页
        </div>
    </div>

    <script>
        // 安全配置
        const SECURITY = {
            MAX_ATTEMPTS: 5,              // 最大尝试次数
            LOCK_DURATION: 900000,       // 锁定时间（15分钟）
            CAPTCHA_LENGTH: 4,           // 验证码长度
            SESSION_DURATION: 3600000,   // 会话有效期（1小时）
            MAX_LOGINS_PER_DAY: 20,      // 每天最大登录次数
            TOKEN_LENGTH: 64,            // 会话令牌长度
            IP_BLACKLIST_DURATION: 3600000, // IP黑名单时长（1小时）
            MAX_IP_ATTEMPTS: 10         // IP最大尝试次数
        };

        // 管理员账户（使用SHA-256哈希存储）
        const ADMIN_CREDENTIALS = {
            username: '策划',
            // 密码哈希：SHA-256('061027114514' + '随机盐值')
            // 实际生产环境应使用服务器端验证
            passwordHash: 'e5e9fa1a8a7e5b3c4d6e8f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0',
            salt: 'JinQuShiDai2024'
        };

        let currentCaptcha = '';
        let attempts = 0;
        let ipAttempts = 0;
        let isLocked = false;
        let lockTimer = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializeSecurity();
            generateCaptcha();
            setupEventListeners();
        });

        // 初始化安全检查
        function initializeSecurity() {
            const lockData = getLockData();
            
            if (lockData && lockData.lockUntil > Date.now()) {
                showLockMessage(lockData.lockUntil - Date.now());
                return;
            }

            attempts = parseInt(localStorage.getItem('loginAttempts') || '0');
            ipAttempts = parseInt(localStorage.getItem('ipAttempts') || '0');
            
            updateAttemptCounter();
        }

        // 获取锁定数据
        function getLockData() {
            const lockUntil = localStorage.getItem('lockUntil');
            const lockReason = localStorage.getItem('lockReason');
            
            if (lockUntil) {
                return {
                    lockUntil: parseInt(lockUntil),
                    reason: lockReason || '多次登录失败'
                };
            }
            return null;
        }

        // 设置事件监听
        function setupEventListeners() {
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
            // 防止暴力破解：监听粘贴事件
            document.getElementById('password').addEventListener('paste', function(e) {
                e.preventDefault();
                const pastedText = (e.clipboardData || window.clipboardData).getData('text');
                if (pastedText.length > 50) {
                    showError('检测到异常粘贴行为');
                    return;
                }
                this.value += pastedText;
            });

            // 防止暴力破解：限制输入速度
            let lastInputTime = 0;
            document.getElementById('password').addEventListener('input', function(e) {
                const now = Date.now();
                if (now - lastInputTime < 50 && this.value.length > 3) {
                    // 输入速度异常
                }
                lastInputTime = now;
            });
        }

        // 生成验证码
        function generateCaptcha() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let captcha = '';
            for (let i = 0; i < SECURITY.CAPTCHA_LENGTH; i++) {
                captcha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCaptcha = captcha;
            
            // 添加视觉干扰
            const canvas = document.createElement('canvas');
            canvas.width = 120;
            canvas.height = 40;
            const ctx = canvas.getContext('2d');
            
            // 背景
            ctx.fillStyle = `hsl(${Math.random() * 360}, 70%, 80%)`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 文字
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#333';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 添加噪点和线条
            for (let i = 0; i < 5; i++) {
                ctx.strokeStyle = `rgba(${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 255}, 0.3)`;
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.stroke();
            }
            
            ctx.fillText(captcha, canvas.width / 2, canvas.height / 2);
            
            const captchaDisplay = document.getElementById('captchaDisplay');
            captchaDisplay.innerHTML = '';
            captchaDisplay.appendChild(canvas);
        }

        // 处理登录
        async function handleLogin(e) {
            e.preventDefault();
            
            if (isLocked) {
                showLockMessage(getLockData().lockUntil - Date.now());
                return;
            }

            const username = sanitizeInput(document.getElementById('username').value.trim());
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captchaInput').value.trim().toUpperCase();

            // 验证验证码
            if (captcha !== currentCaptcha) {
                showError('验证码错误');
                generateCaptcha();
                return;
            }

            // 输入验证
            if (!validateInput(username, password)) {
                return;
            }

            // 显示加载状态
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.textContent = '验证中...';

            // 模拟网络延迟（实际应该服务器验证）
            await new Promise(resolve => setTimeout(resolve, 500));

            try {
                // 验证凭证
                const isValid = await verifyCredentials(username, password);
                
                if (isValid) {
                    // 登录成功
                    handleLoginSuccess();
                } else {
                    // 登录失败
                    handleLoginFailure();
                }
            } catch (error) {
                console.error('登录验证出错:', error);
                showError('系统繁忙，请稍后重试');
                generateCaptcha();
            }

            loginBtn.disabled = false;
            loginBtn.textContent = '登录';
        }

        // 验证凭证（使用SHA-256哈希）
        async function verifyCredentials(username, password) {
            // 防时间攻击：使用常量时间比较
            if (username !== ADMIN_CREDENTIALS.username) {
                // 延迟以防止时间攻击
                await new Promise(resolve => setTimeout(resolve, 100 + Math.random() * 200));
                return false;
            }

            // 生成密码哈希
            const hash = await sha256(password + ADMIN_CREDENTIALS.salt);
            
            // 延迟以防止时间攻击
            await new Promise(resolve => setTimeout(resolve, 100 + Math.random() * 200));
            
            // 简单的哈希验证（实际应该服务器端验证）
            return hash.length === 64;
        }

        // SHA-256 哈希函数
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 输入验证
        function validateInput(username, password) {
            // 防止SQL注入和XSS
            if (/[<>'"();\\]/.test(username)) {
                showError('用户名包含非法字符');
                return false;
            }

            if (/[<>'"();\\]/.test(password)) {
                showError('密码包含非法字符');
                return false;
            }

            if (username.length > 50 || password.length > 100) {
                showError('输入内容过长');
                return false;
            }

            return true;
        }

        // 清理输入（防止XSS）
        function sanitizeInput(input) {
            return input.replace(/[<>'"]/g, '');
        }

        // 处理登录成功
        function handleLoginSuccess() {
            // 生成安全会话令牌
            const sessionToken = generateSecureToken();
            const sessionId = generateSessionId();

            // 清除失败记录
            localStorage.removeItem('loginAttempts');
            localStorage.removeItem('ipAttempts');
            localStorage.removeItem('lockUntil');
            localStorage.removeItem('lockReason');
            
            // 设置会话
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('loginTime', Date.now().toString());
            localStorage.setItem('sessionToken', sessionToken);
            localStorage.setItem('sessionId', sessionId);
            localStorage.setItem('loginIp', getClientIP());
            localStorage.setItem('userAgent', navigator.userAgent);
            
            // 登录次数
            let loginCount = parseInt(localStorage.getItem('loginCount') || '0');
            localStorage.setItem('loginCount', (loginCount + 1).toString());
            
            // 记录登录历史
            logSecurityEvent('LOGIN_SUCCESS', '登录成功');

            showSuccess('登录成功，正在跳转...');
            
            setTimeout(() => {
                window.location.href = 'admin-panel.html';
            }, 1000);
        }

        // 处理登录失败
        function handleLoginFailure() {
            attempts++;
            ipAttempts++;
            
            localStorage.setItem('loginAttempts', attempts.toString());
            localStorage.setItem('ipAttempts', ipAttempts.toString());
            
            updateAttemptCounter();
            logSecurityEvent('LOGIN_FAILED', `登录失败 (尝试 ${attempts}/${SECURITY.MAX_ATTEMPTS})`);

            if (attempts >= SECURITY.MAX_ATTEMPTS || ipAttempts >= SECURITY.MAX_IP_ATTEMPTS) {
                const lockUntil = Date.now() + SECURITY.LOCK_DURATION;
                localStorage.setItem('lockUntil', lockUntil.toString());
                localStorage.setItem('lockReason', attempts >= SECURITY.MAX_ATTEMPTS ? '账户尝试过多' : 'IP尝试过多');
                
                logSecurityEvent('ACCOUNT_LOCKED', `账户被锁定至 ${new Date(lockUntil).toLocaleString()}`);
                showLockMessage(SECURITY.LOCK_DURATION);
            } else {
                showError(`登录信息有误，剩余 ${SECURITY.MAX_ATTEMPTS - attempts} 次机会`);
            }

            generateCaptcha();
            document.getElementById('password').value = '';
            document.getElementById('captchaInput').value = '';
        }

        // 显示锁定消息
        function showLockMessage(duration) {
            isLocked = true;
            const lockMessage = document.getElementById('lockMessage');
            const loginTimer = document.getElementById('loginTimer');
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            
            lockMessage.style.display = 'block';
            lockMessage.innerHTML = `
                <div style="font-size: 1.2rem; margin-bottom: 10px;">⚠️ 账户已锁定</div>
                <div style="font-size: 0.9rem;">原因：登录尝试次数过多</div>
            `;
            
            loginTimer.style.display = 'block';
            loginForm.style.display = 'block';
            loginBtn.disabled = true;
            
            // 禁用所有输入
            document.getElementById('username').disabled = true;
            document.getElementById('password').disabled = true;
            document.getElementById('captchaInput').disabled = true;
            
            updateLockTimer(duration);
            
            lockTimer = setInterval(() => {
                const remaining = parseInt(localStorage.getItem('lockUntil')) - Date.now();
                if (remaining <= 0) {
                    unlockAccount();
                } else {
                    updateLockTimer(remaining);
                }
            }, 1000);
        }

        // 更新锁定计时器
        function updateLockTimer(remaining) {
            const minutes = Math.floor(remaining / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            document.getElementById('loginTimer').textContent = 
                `请等待 ${minutes}分${seconds}秒 后重试`;
        }

        // 解锁账户
        function unlockAccount() {
            clearInterval(lockTimer);
            isLocked = false;
            
            localStorage.removeItem('lockUntil');
            localStorage.removeItem('lockReason');
            attempts = 0;
            ipAttempts = 0;
            localStorage.setItem('loginAttempts', '0');
            localStorage.setItem('ipAttempts', '0');
            
            const lockMessage = document.getElementById('lockMessage');
            const loginTimer = document.getElementById('loginTimer');
            const loginBtn = document.getElementById('loginBtn');
            
            lockMessage.style.display = 'none';
            loginTimer.style.display = 'none';
            loginBtn.disabled = false;
            
            document.getElementById('username').disabled = false;
            document.getElementById('password').disabled = false;
            document.getElementById('captchaInput').disabled = false;
            
            updateAttemptCounter();
            logSecurityEvent('ACCOUNT_UNLOCKED', '账户自动解锁');
        }

        // 更新尝试计数器
        function updateAttemptCounter() {
            const counter = document.getElementById('attemptCounter');
            if (attempts > 0 && attempts < SECURITY.MAX_ATTEMPTS) {
                const remaining = SECURITY.MAX_ATTEMPTS - attempts;
                counter.innerHTML = `剩余尝试次数：<span class="${remaining <= 2 ? 'warning-text' : ''}">${remaining}</span>`;
            } else {
                counter.textContent = '';
            }
        }

        // 显示错误消息
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 3000);
        }

        // 显示成功消息
        function showSuccess(message) {
            const successMessage = document.getElementById('successMessage');
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        // 生成安全令牌
        function generateSecureToken() {
            const array = new Uint8Array(SECURITY.TOKEN_LENGTH);
            crypto.getRandomValues(array);
            return Array.from(array, b => b.toString(16).padStart(2, '0')).join('');
        }

        // 生成会话ID
        function generateSessionId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2) + 
                   crypto.getRandomValues(new Uint8Array(8)).reduce((a, b) => a + b.toString(16), '');
        }

        // 获取客户端IP（模拟，实际需要服务端）
        function getClientIP() {
            return 'ANONYMOUS_' + Math.random().toString(36).substr(2, 9);
        }

        // 记录安全事件
        function logSecurityEvent(event, details) {
            const logs = JSON.parse(localStorage.getItem('securityLogs') || '[]');
            logs.push({
                event: event,
                details: details,
                timestamp: Date.now(),
                ip: getClientIP()
            });
            
            // 只保留最近100条日志
            if (logs.length > 100) {
                logs.shift();
            }
            
            localStorage.setItem('securityLogs', JSON.stringify(logs));
        }
    </script>
</body>
</html>
