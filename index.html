<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进取时代制作组</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 公告栏 -->
    <div id="announcementBar" class="announcement-bar">
        <button id="announcementToggle" class="announcement-toggle" onclick="toggleAnnouncement()" title="公告">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span id="announcementDot" class="announcement-dot" style="display: none;"></span>
        </button>
        <div id="announcementPanel" class="announcement-panel">
            <div class="announcement-header">
                <h3>公告</h3>
                <button class="announcement-close" onclick="toggleAnnouncement()">×</button>
            </div>
            <div id="announcementContent" class="announcement-content">
                <!-- 公告内容将动态加载 -->
            </div>
        </div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>进取时代制作组</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#hero" data-lang-key="首页">首页</a></li>
                <li><a href="main-works.html" data-lang-key="主要作品">主要作品</a></li>
                <li><a href="other-works.html" data-lang-key="其他作品">其他作品</a></li>
                <li><a href="fun-stuff.html" data-lang-key="有意思的东西">有意思的东西</a></li>
                <li><a href="about.html" data-lang-key="关于我们">关于我们</a></li>
            </ul>
            <div class="language-selector">
                <button class="lang-btn active" data-lang="zh">汉语</button>
                <button class="lang-btn" data-lang="zh-hant">漢語</button>
                <button class="lang-btn" data-lang="en">ENG</button>
            </div>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <ul class="mobile-nav-links">
                <li><a href="#hero" data-lang-key="首页" onclick="toggleMobileMenu()">首页</a></li>
                <li><a href="main-works.html" data-lang-key="主要作品">主要作品</a></li>
                <li><a href="other-works.html" data-lang-key="其他作品">其他作品</a></li>
                <li><a href="fun-stuff.html" data-lang-key="有意思的东西">有意思的东西</a></li>
                <li><a href="about.html" data-lang-key="关于我们">关于我们</a></li>
            </ul>
        </div>
    </nav>

    <!-- 英雄区域 -->
    <section id="hero" class="hero">
        <div class="hero-content">
            <div class="timer-display">
                <div class="lunar-time">
                    <div id="lunarYear" class="lunar-year">黄历年份</div>
                    <div id="lunarDate" class="lunar-date">农历日期</div>
                </div>
                <div class="gregorian-time">
                    <div id="gregorianDate" class="gregorian-date">公历日期</div>
                    <div id="gregorianTime" class="gregorian-time-value">00:00:00</div>
                </div>
            </div>
            <h2 class="hero-title" data-lang-key="进取时代制作组">进取时代制作组</h2>
            <p class="hero-subtitle" data-lang-key="谱写新世界的史诗">譜寫新世界的史詩</p>

        </div>
        <div class="hero-decoration">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
    </section>

    <!-- 作品预览 -->
    <section class="preview-section">
        <div class="container">
            <h2 class="section-title" data-lang-key="精选作品">精选作品</h2>
            <div class="works-grid" id="worksGrid">
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <h3>进取时代制作组</h3>
                    <p>谱写新世界的史诗</p>
                </div>
                <div class="footer-links">
                    <ul>
                        <li><a href="main-works.html">主要作品</a></li>
                        <li><a href="other-works.html">其他作品</a></li>
                        <li><a href="fun-stuff.html">有意思的东西</a></li>
                        <li><a href="about.html">关于我们</a></li>
                    </ul>
                </div>
                <div class="footer-social">
                    <p>联系我们</p>
                    <div class="social-icons">
                        <a href="https://www.zhihu.com/people/86-63-86-78-68" target="_blank" class="icon">知乎</a>
                        <a href="https://space.bilibili.com/1070063035" target="_blank" class="icon">B站</a>
                        <span class="icon">QQ群: 887551265</span>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy;  进取时代制作组. 保留所有权利.</p>
            </div>
            <div class="admin-login">
                <a href="admin-login.html" class="key-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="m16.65 8.35-1.4 1.4a2 2 0 0 1-2.83 0l-1.4-1.4a6 6 0 1 0 8.48 0Z"></path>
                        <path d="M12 14v4"></path>
                        <path d="M8 18h8"></path>
                    </svg>
                </a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
